name: Build & Release
run-name: ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

jobs:
  # ── macOS builds ──
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-latest
            bun_target: bun-darwin-arm64
            sidecar_suffix: aarch64-apple-darwin
            tauri_args: "--target aarch64-apple-darwin"
            platform_label: "macOS Apple Silicon"
          - arch: x86_64
            runner: macos-latest
            bun_target: bun-darwin-x64
            sidecar_suffix: x86_64-apple-darwin
            tauri_args: "--target x86_64-apple-darwin"
            platform_label: "macOS Intel"

    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.platform_label }}

    steps:
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (x86_64 cross-compile)
        if: matrix.arch == 'x86_64'
        run: rustup target add x86_64-apple-darwin

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ matrix.arch }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ matrix.arch }}-

      - name: Install root dependencies
        run: bun install

      - name: Install web dependencies
        run: bun install
        working-directory: web

      - name: Set version & updater endpoint
        shell: bash
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: |
          bun -e "
            const fs = require('fs');
            const ver = '${{ steps.version.outputs.VERSION }}';
            const endpoint = process.env.OSS_BUCKET + '.' + process.env.OSS_ENDPOINT;
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = ver;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            tauri.version = ver;
            tauri.plugins.updater.endpoints = ['https://' + endpoint + '/releases/latest.json'];
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2) + '\n');
          "

      - name: Prepare runtime directories
        run: mkdir -p agents && touch agents/.gitkeep
        shell: bash

      - name: Build sidecar
        run: |
          mkdir -p src-tauri/bin
          bun build --compile --target=${{ matrix.bun_target }} src/index.ts --outfile src-tauri/bin/youclaw-server-${{ matrix.sidecar_suffix }}

      - name: Import macOS certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERTS }}
          p12-password: ${{ secrets.MAC_CERTS_PASSWORD }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.MAC_CERTS }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "You Claw v${{ steps.version.outputs.VERSION }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}
          uploadUpdaterJson: false

      - name: Notify Feishu
        if: always()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "You Claw v${{ steps.version.outputs.VERSION }} · ${{ matrix.platform_label }} ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "Build "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && 'succeeded' || 'failed' }}"

  # ── Windows build ──
  build-windows:
    runs-on: windows-latest
    name: Build Windows x64

    steps:
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-windows-x64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-windows-x64-

      - name: Install root dependencies
        run: bun install

      - name: Install web dependencies
        run: bun install
        working-directory: web

      - name: Set version & updater endpoint
        shell: bash
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: |
          bun -e "
            const fs = require('fs');
            const ver = '${{ steps.version.outputs.VERSION }}';
            const endpoint = process.env.OSS_BUCKET + '.' + process.env.OSS_ENDPOINT;
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = ver;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            tauri.version = ver;
            tauri.plugins.updater.endpoints = ['https://' + endpoint + '/releases/latest.json'];
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2) + '\n');
          "

      - name: Prepare runtime directories
        run: mkdir -p agents && touch agents/.gitkeep
        shell: bash

      - name: Build sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/bin
          bun build --compile --target=bun-windows-x64 src/index.ts --outfile src-tauri/bin/youclaw-server-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "You Claw v${{ steps.version.outputs.VERSION }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false

      - name: Notify Feishu
        if: always()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "You Claw v${{ steps.version.outputs.VERSION }} · Windows x64 ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "Build "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && 'succeeded' || 'failed' }}"

  # ── Linux build ── [temporarily disabled]
  build-linux:
    if: false
    runs-on: ubuntu-22.04
    name: Build Linux x64

    steps:
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install root dependencies
        run: bun install

      - name: Install web dependencies
        run: bun install
        working-directory: web

      - name: Set version & updater endpoint
        shell: bash
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: |
          bun -e "
            const fs = require('fs');
            const ver = '${{ steps.version.outputs.VERSION }}';
            const endpoint = process.env.OSS_BUCKET + '.' + process.env.OSS_ENDPOINT;
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = ver;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            tauri.version = ver;
            tauri.plugins.updater.endpoints = ['https://' + endpoint + '/releases/latest.json'];
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2) + '\n');
          "

      - name: Prepare runtime directories
        run: mkdir -p agents && touch agents/.gitkeep
        shell: bash

      - name: Build sidecar
        run: |
          mkdir -p src-tauri/bin
          bun build --compile --target=bun-linux-x64 src/index.ts --outfile src-tauri/bin/youclaw-server-x86_64-unknown-linux-gnu

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "You Claw v${{ steps.version.outputs.VERSION }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false

      - name: Notify Feishu
        if: always()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "You Claw v${{ steps.version.outputs.VERSION }} · Linux x64 ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "Build "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && 'succeeded' || 'failed' }}"

  # ── Upload to OSS & generate updater manifest ──
  updater:
    needs: [build-mac, build-windows]
    if: always() && (needs.build-mac.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    name: Upload to OSS & generate latest.json

    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install ossutil
        run: |
          curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

      - name: Configure ossutil
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: |
          ossutil config \
            -e "$OSS_ENDPOINT" \
            -i "$OSS_ACCESS_KEY_ID" \
            -k "$OSS_ACCESS_KEY_SECRET"

      - name: Download release assets & upload to OSS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          OSS_BASE="oss://${OSS_BUCKET}/releases/${TAG}"
          CDN_BASE="https://${OSS_BUCKET}.${OSS_ENDPOINT}/releases/${TAG}"

          # 下载所有 release 产物（安装包 + 签名）
          mkdir -p assets
          gh release download "$TAG" -R "$REPO" --dir assets || true

          echo "=== Downloaded assets ==="
          ls -la assets/

          # 上传所有产物到 OSS（版本目录 + latest 固定目录）
          for f in assets/*; do
            [ ! -f "$f" ] && continue
            NAME=$(basename "$f")
            echo "Uploading: $NAME"
            ossutil cp "$f" "${OSS_BASE}/${NAME}" -f
            ossutil cp "$f" "oss://${OSS_BUCKET}/releases/latest/${NAME}" -f
          done

          # 构建 latest.json
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PLATFORMS='{}'

          for f in assets/*.sig; do
            [ ! -f "$f" ] && continue
            SIG=$(cat "$f")
            NAME=$(basename "$f")

            case "$NAME" in
              *_aarch64.app.tar.gz.sig)
                PLATFORMS=$(echo "$PLATFORMS" | jq \
                  --arg sig "$SIG" \
                  --arg url "${CDN_BASE}/You.Claw_aarch64.app.tar.gz" \
                  '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
                ;;
              *_x64.app.tar.gz.sig)
                PLATFORMS=$(echo "$PLATFORMS" | jq \
                  --arg sig "$SIG" \
                  --arg url "${CDN_BASE}/You.Claw_x64.app.tar.gz" \
                  '. + {"darwin-x86_64": {"signature": $sig, "url": $url}}')
                ;;
              *_x64-setup.nsis.zip.sig)
                PLATFORMS=$(echo "$PLATFORMS" | jq \
                  --arg sig "$SIG" \
                  --arg url "${CDN_BASE}/You.Claw_${VERSION}_x64-setup.nsis.zip" \
                  '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
                ;;
            esac
          done

          jq -n \
            --arg version "$VERSION" \
            --arg date "$DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, pub_date: $date, platforms: $platforms}' > latest.json

          echo "=== latest.json ==="
          cat latest.json

          # 上传 latest.json 到固定路径（updater 读取）
          ossutil cp latest.json "oss://${OSS_BUCKET}/releases/latest.json" -f

      - name: Notify Feishu
        if: always()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "You Claw ${{ github.ref_name }} · OSS Upload ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "OSS upload & updater "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && 'succeeded' || 'failed' }}"
