appId: com.youclaw.app
productName: You Claw
directories:
  buildResources: resources
  output: release

files:
  - dist/**/*
  - src/**/*
  - agents/**/*
  - skills/**/*
  - prompts/**/*
  - resources/**/*
  - package.json
  - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/**/x64-linux"
  - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/**/arm64-linux"
  - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/**/x64-win32"
  - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/**/arm64-win32"
  - "!node_modules/@img/sharp-*"

asarUnpack:
  - "dist/src/**/*"
  - "**/*.node"
  - "**/better-sqlite3/**"
  - "**/bindings/**"
  - "**/file-uri-to-path/**"
  - "**/node_modules/@anthropic-ai/claude-agent-sdk/vendor/**"

mac:
  category: public.app-category.utilities
  icon: resources/logo.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  artifactName: "You-Claw-${version}-${arch}.${ext}"
  target:
    - dmg
    - zip

win:
  icon: resources/logo.ico
  artifactName: "You-Claw-${version}.${ext}"
  target:
    - nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  icon: resources/logo.png
  artifactName: "You-Claw-${version}-${arch}.${ext}"
  target:
    - AppImage
    - deb
  category: Utility

publish:
  provider: github
